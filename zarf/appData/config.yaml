Env:
  Loglevel: "info"
  Production: false

# Application settings exposed to the frontend
Settings:
  DateFormat: "DD/MM/YYYY"     # tokens: YYYY, YY, MM, DD; separators: - / .
  MainCurrency: "CHF"          # ISO 4217, 3 uppercase letters
  Currencies:                  # must include MainCurrency
    - "CHF"
    - "USD"
    - "EUR"
    - "JPY"
  Instruments: true

# Market data importers (named). Supported: Massive.
# For development, prefer setting API keys via .env (see .env.example) so they are not committed.
# Example: ETNA_MARKETDATAIMPORTERS_MASSIVE_APIKEYS_0=your_key
